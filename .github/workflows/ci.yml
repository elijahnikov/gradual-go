name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.21", "1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: elijahnikov/gradual-sdk-spec
          path: gradual-sdk-spec

      - name: Symlink spec to sibling path
        run: ln -s "$GITHUB_WORKSPACE/gradual-sdk-spec" ../gradual-sdk-spec

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v ./...
